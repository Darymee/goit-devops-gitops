replicaCount: 2

image:
  repository: 211125442148.dkr.ecr.us-west-2.amazonaws.com/django-app
  tag: 'latest'
  pullPolicy: IfNotPresent

# Terraform creates this Secret in the django-app namespace. It contains
# SECRET_KEY, DB_HOST (RDS endpoint), DB_PORT, DB_NAME, DB_USER and DB_PASSWORD.
existingSecret: django-app-secret

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

env:
  DJANGO_SETTINGS_MODULE: config.settings
  DEBUG: 'False'

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
